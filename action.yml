name: Stability Flow
description: Run Stability Flow CLI validations for branch names, merge targets, branch origins, and commit messages.
author: KiTechSoftware

inputs:
  command:
    description: "CLI command: validate-merge, validate-origin, validate-commit, or validate-branch-name"
    required: true
  branch:
    description: "Branch name for validate-branch-name or validate-origin"
    required: false
  base:
    description: "Base branch for validate-origin"
    required: false
  source:
    description: "Source branch for validate-merge"
    required: false
  target:
    description: "Target branch for validate-merge"
    required: false
  message:
    description: "Commit message or PR title for validate-commit"
    required: false
  mode:
    description: "Commit validation mode: work or squash"
    required: false
    default: squash
  format:
    description: "CLI output format: text, json, jsonl, markdown"
    required: false
    default: text
  github-summary:
    description: "Append formatted output to GITHUB_STEP_SUMMARY when available"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Pull validator image
      shell: bash
      run: |
        set -euo pipefail
        docker pull ghcr.io/kitechsoftware/stability-flow-validator:latest

    - name: Run validator
      shell: bash
      env:
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_BRANCH: ${{ inputs.branch }}
        INPUT_BASE: ${{ inputs.base }}
        INPUT_SOURCE: ${{ inputs.source }}
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_MESSAGE: ${{ inputs.message }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_GITHUB_SUMMARY: ${{ inputs.github-summary }}
      run: |
        set +e

        args=()
        args+=("$INPUT_COMMAND")

        if [[ -n "${INPUT_BRANCH}" ]]; then
          args+=("--branch" "$INPUT_BRANCH")
        fi

        if [[ -n "${INPUT_BASE}" ]]; then
          args+=("--base" "$INPUT_BASE")
        fi

        if [[ -n "${INPUT_SOURCE}" ]]; then
          args+=("--source" "$INPUT_SOURCE")
        fi

        if [[ -n "${INPUT_TARGET}" ]]; then
          args+=("--target" "$INPUT_TARGET")
        fi

        if [[ -n "${INPUT_MESSAGE}" ]]; then
          args+=("--message" "$INPUT_MESSAGE")
        fi

        if [[ -n "${INPUT_MODE}" ]]; then
          args+=("--mode" "$INPUT_MODE")
        fi

        if [[ -n "${INPUT_FORMAT}" ]]; then
          args+=("--format" "$INPUT_FORMAT")
        fi

        OUTPUT="$(
          docker run --rm \
            ghcr.io/kitechsoftware/stability-flow-validator:latest \
            "${args[@]}" 2>&1
        )"
        STATUS=$?

        printf '%s\n' "$OUTPUT"

        if [[ "${INPUT_GITHUB_SUMMARY}" == "true" && -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
          case "${INPUT_COMMAND}" in
            validate-branch-name)
              if [[ -n "${INPUT_BRANCH}" ]]; then
                SUMMARY_TITLE="Branch validation: \`${INPUT_BRANCH}\`"
              else
                SUMMARY_TITLE="Branch validation"
              fi
              ;;
            validate-merge)
              SUMMARY_TITLE="Merge validation: \`${INPUT_SOURCE}\` → \`${INPUT_TARGET}\`"
              ;;
            validate-origin)
              SUMMARY_TITLE="Origin validation: \`${INPUT_BRANCH}\` from \`${INPUT_BASE}\`"
              ;;
            validate-commit)
              if [[ "${INPUT_MODE}" == "squash" ]]; then
                SUMMARY_TITLE="PR title validation"
              else
                SUMMARY_TITLE="Commit message validation"
              fi
              ;;
            *)
              SUMMARY_TITLE="Stability Flow Validation"
              ;;
          esac

          {
            echo "### ${SUMMARY_TITLE}"
            echo

            if [[ "${INPUT_FORMAT}" == "markdown" ]]; then
              printf '%s\n' "$OUTPUT"
            else
              echo '```text'
              printf '%s\n' "$OUTPUT"
              echo '```'
            fi

            echo
          } >> "$GITHUB_STEP_SUMMARY"
        fi

        exit "$STATUS"
        