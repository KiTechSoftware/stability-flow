name: Stability Flow Push

on:
  workflow_call:
    inputs:
      branch:
        description: "Branch name from the push event"
        required: true
        type: string

      message:
        description: "Commit message to validate"
        required: true
        type: string

      format:
        description: "CLI output format"
        required: false
        default: text
        type: string

      github-summary:
        description: "Append validator output to the GitHub Actions job summary"
        required: false
        default: false
        type: boolean

jobs:
  enforce:
    name: Enforce Stability Flow Push Rules
    runs-on: ubuntu-latest

    steps:
      - name: Validate pushed branch name
        uses: KiTechSoftware/stability-flow@main
        with:
          command: validate-branch-name
          branch: ${{ inputs.branch }}
          format: ${{ inputs.format }}
          github-summary: ${{ inputs.github-summary }}

      - name: Validate pushed commit message
        uses: KiTechSoftware/stability-flow@main
        with:
          command: validate-commit
          message: ${{ inputs.message }}
          mode: work
          format: ${{ inputs.format }}
          github-summary: ${{ inputs.github-summary }}